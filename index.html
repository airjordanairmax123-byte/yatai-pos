<body>

<h1>🏮 屋台POS Ver.2</h1>

<div class="card">

<h2>担当者</h2>

<input
type="text"
id="cashier"
placeholder="担当者名を入力">

</div>

<div
id="items">
</div>

<div class="card">

<h2>合計金額</h2>

<div
id="cartTotal"
class="big-total">

0円

</div>

<div class="actions">

<button
class="checkout"
onclick="checkout()">

会計

</button>

<button
class="reset"
onclick="resetCart()">

リセット

</button>

</div>

</div>

<div class="card">

<h2>本日の売上</h2>

<div
id="dailyTotal"
class="big-total">

0円

</div>

</div>

<div class="card">

<h2>商品別集計</h2>

<div
id="productSummary">

準備中

</div>

</div>

<div class="card">

<h2>売上履歴</h2>

<div
id="history">

まだ売上がありません

</div>

</div>

<button
class="latest"
onclick="cancelLatestSale()">

最新会計を取消

</button>

<button
class="csv"
onclick="downloadCSV()">

CSVダウンロード

</button>

</body>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#f3f4f6;
padding:12px;
max-width:700px;
margin:auto;
}

h1{
background:#1e293b;
color:#fff;
padding:18px;
text-align:center;
border-radius:18px;
margin-bottom:15px;
font-size:32px;
}

.card{

padding:15px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
margin-bottom:10px;
font-size:22px;
}

#cashier{
width:100%;
height:55px;
font-size:20px;
padding:10px;
border:1px solid #ccc;
border-radius:12px;
}

#items{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.item{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.item img{
width:100%;
height:130px;
object-fit:cover;
display:block;
}

.item-body{
padding:10px;
}

.item-name{
font-size:18px;
font-weight:bold;
}

.item-price{
margin-top:5px;
color:#666;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-top:12px;
}

.qty button{
width:46px;
height:46px;
border:none;
border-radius:12px;
font-size:28px;
font-weight:bold;
color:#fff;
cursor:pointer;
}

.minus{
background:#ef4444;
}

.plus{
background:#22c55e;
}

.qty span{
font-size:24px;
font-weight:bold;
min-width:32px;
text-align:center;
}

.big-total{
font-size:48px;
font-weight:bold;
text-align:center;
margin:15px 0;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button,
.latest,
.csv{
height:65px;

font-size:22px;
font-weight:bold;
color:#fff;
cursor:pointer;
}

.checkout{
background:#22c55e;
}

.reset{
background:#ef4444;
}

.latest{
background:#f59e0b;

margin-bottom:10px;
}

.csv{
background:#3b82f6;
width:100%;
}

#productSummary,
#history{
font-size:20px;
line-height:1.8;
}

.sale-card{
padding:12px;
border-bottom:1px solid #ddd;
}

.cancelled{
color:red;
font-weight:bold;
}

@media(max-width:600px){

#items{
grid-template-columns:1fr;
}

h1{
font-size:28px;
}

.big-total{
font-size:40px;
}

.actions button,
.latest,
.csv{
font-size:20px;
