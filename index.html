<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>POS</title>
<style>
.sale-card { border:1px solid #ccc; margin:10px; padding:10px; }
.big-total { font-size:24px; margin:10px 0; }
</style>
</head>
<body>

<h2>POSレジ</h2>

<div id="items"></div>

<div id="cartTotal" class="big-total">0円</div>

<div class="actions">
  <button onclick="checkout()">会計</button>
  <button onclick="resetCart()">リセット</button>
</div>

<button onclick="cancelLatestSale()">最新会計を取消</button>

<hr>

<h3>売上履歴</h3>
<div id="history"></div>

<h3 id="summary"></h3>

<button onclick="downloadCSV()">CSV出力</button>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* =====================
   Firebase初期化
===================== */
const firebaseConfig = {
  apiKey: "AIzaSyCWoAJihRNiylAvE7IQMY4LsIwDF3duBTA",
  authDomain: "ringo-44a8c.firebaseapp.com",
  projectId: "ringo-44a8c",
  storageBucket: "ringo-44a8c.firebasestorage.app",
  messagingSenderId: "588192537966",
  appId: "1:588192537966:web:b6fcc4da16431c62d0757f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =====================
   データ
===================== */
let sales = [];
let cart = [];

/* =====================
   Firestoreリアルタイム取得
===================== */
const salesQuery = query(
  collection(db, "sales"),
  orderBy("createdAt", "desc")
);

onSnapshot(salesQuery, (snapshot) => {
  sales = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  renderHistory();
  renderSummary();
});

/* =====================
   会計
===================== */
window.checkout = async function () {
  if (cart.length === 0) return;

  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  await addDoc(collection(db, "sales"), {
    items: cart,
    total,
    cashier: "担当A",
    cancelled: false,
    createdAt: Date.now()
  });

  cart = [];
  renderItems();

  alert("会計完了：" + total + "円");
};

/* =====================
   取消
===================== */
window.cancelLatestSale = async function () {

  const active = sales.filter(s => !s.cancelled);

  if (active.length === 0) {
    alert("取消できる会計がありません");
    return;
  }

  const latest = active[0];

  if (!confirm("最新会計を取消しますか？")) return;

  await updateDoc(doc(db, "sales", latest.id), {
    cancelled: true,
    cancelledAt: Date.now()
  });
};

/* =====================
   表示
===================== */
function renderHistory() {
  const el = document.getElementById("history");

  if (sales.length === 0) {
    el.innerHTML = "<p>まだ売上がありません</p>";
    return;
  }

  let html = "";

  sales.forEach(sale => {
    const items = (sale.items || [])
      .map(i => `${i.name}×${i.qty}`)
      .join("<br>");

    html += `
      <div class="sale-card">
        <div>${new Date(sale.createdAt).toLocaleString()}</div>
        <div>担当：${sale.cashier}</div>
        <div>${items}</div>
        <div>合計：${sale.total}円</div>
        <div>${sale.cancelled ? "取消済み" : "正常"}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}

function renderSummary() {
  const total = sales
    .filter(s => !s.cancelled)
    .reduce((sum, s) => sum + (s.total || 0), 0);

  document.getElementById("summary").innerText =
    "売上合計：" + total + "円";
}

function renderItems() {
  document.getElementById("items").innerHTML =
    cart.map(i => `${i.name} × ${i.qty}`).join("<br>");
}

/* =====================
   CSV
===================== */
window.downloadCSV = function () {

  let csv = "日時,担当者,合計,状態\n";

  sales.forEach(s => {
    csv += `${new Date(s.createdAt).toLocaleString()},${s.cashier},${s.total},${s.cancelled}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "sales.csv";
  link.click();
};
</script>

</body>
</html>
