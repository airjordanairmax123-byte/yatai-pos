<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>屋台POS 完全版</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#f3f4f6;
padding:15px;
}

h1{
background:#1e293b;
color:white;
padding:20px;
border-radius:20px;
text-align:center;
font-size:40px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

#cashier{
width:100%;
height:55px;
font-size:22px;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
}

#items{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.item{
background:white;
border-radius:20px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.item img{
width:100%;
height:140px;
object-fit:cover;
border-radius:15px;
}

.item-name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.item-price{
color:#666;
margin-top:5px;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty button{
width:50px;
height:50px;
border:none;
border-radius:12px;
font-size:28px;
font-weight:bold;
background:#e5e7eb;
}

.qty span{
font-size:28px;
font-weight:bold;
}

.big-total{
font-size:60px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button{
height:70px;
border:none;
border-radius:15px;
font-size:24px;
font-weight:bold;
color:white;
}

.checkout{
background:#22c55e;
}

.reset{
background:#ef4444;
}

.latest{
width:100%;
height:70px;
margin-top:10px;
background:#f59e0b;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
}

.csv{
width:100%;
height:70px;
margin-top:10px;
background:#3b82f6;
color:white;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
}

.sale-card{
padding:12px;
border-bottom:1px solid #ddd;
}

.cancelled{
color:red;
font-weight:bold;
}

.summary{
font-size:22px;
line-height:2;
}
</style></head><body><h1>屋台POS</h1><div class="card">
<h2>担当者名</h2>
<input id="cashier" placeholder="会計ごとに入力">
</div><div id="items"></div><div id="cartTotal" class="big-total">0円</div><div class="actions">
<button class="checkout" onclick="checkout()">会計</button>
<button class="reset" onclick="resetCart()">リセット</button>
</div><button class="latest" onclick="cancelLatestSale()">
最新会計を取消
</button><button class="csv" onclick="downloadCSV()">
CSVダウンロード
</button><div class="card">
<h2>本日の売上合計</h2>
<div id="dailyTotal" class="big-total">0円</div>
</div><div class="card">
<h2>商品別集計</h2>
<div id="productSummary" class="summary"></div>
</div><div class="card">
<h2>売上履歴</h2>
<div id="history"></div>
</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCWoAJihRNiylAvE7IQMY4LsIwDF3duBTA",
authDomain:"ringo-44a8c.firebaseapp.com",
projectId:"ringo-44a8c",
storageBucket:"ringo-44a8c.firebasestorage.app",
messagingSenderId:"588192537966",
appId:"1:588192537966:web:b6fcc4da16431c62d0757f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const products = {
"冷やしきゅうり":{
price:200,
img:"CUCUMBER_IMAGE_URL"
},
"ヨーヨー釣り":{
price:100,
img:"YOYO_IMAGE_URL"
},
"フルーツミックス":{
price:200,
img:"FRUIT_IMAGE_URL"
},
"ポッキンアイス":{
price:100,
img:"ICE_IMAGE_URL"
}
};

let cart={};
let sales=[];

for(let p in products){
cart[p]=0;
}

function renderItems(){

let html="";
let total=0;

for(let name in products){

const item=products[name];
const qty=cart[name];

total+=item.price*qty;

html+=`
<div class="item">
<img src="${item.img}">
<div class="item-name">${name}</div>
<div class="item-price">${item.price}円</div>

<div class="qty">
<button onclick="removeItem('${name}')">−</button>
<span>${qty}</span>
<button onclick="addItem('${name}')">＋</button>
</div>
</div>
`;
}

document.getElementById("items").innerHTML=html;
document.getElementById("cartTotal").innerText=total+"円";
}

window.addItem=(name)=>{
cart[name]++;
renderItems();
};

window.removeItem=(name)=>{
if(cart[name]>0) cart[name]--;
renderItems();
};

window.resetCart=()=>{
for(let p in cart) cart[p]=0;
renderItems();
};

window.checkout=async()=>{

const cashier=
document.getElementById("cashier").value.trim();

if(!cashier){
alert("担当者名を入力してください");
return;
}

let items=[];
let total=0;

for(let p in cart){

if(cart[p]>0){

items.push({
name:p,
qty:cart[p],
price:products[p].price
});

total+=cart[p]*products[p].price;
}
}

if(total===0){
alert("商品を選択してください");
return;
}

await addDoc(collection(db,"sales"),{
cashier,
items,
total,
cancelled:false,
createdAt:Date.now()
});

document.getElementById("cashier").value="";
resetCart();

alert("会計完了");
};

const q=query(
collection(db,"sales"),
orderBy("createdAt","desc")
);

onSnapshot(q,(snap)=>{

sales=[];

snap.forEach(docSnap=>{
sales.push({
id:docSnap.id,
...docSnap.data()
});
});

renderHistory();
renderSummary();
});

function renderHistory(){

let html="";

sales.forEach(s=>{

html+=`
<div class="sale-card">
<div>${new Date(s.createdAt).toLocaleString()}</div>
<div>担当:${s.cashier}</div>
<div>${s.total}円</div>
${s.cancelled ? '<div class="cancelled">取消済み</div>' : ''}
</div>
`;
});

document.getElementById("history").innerHTML=html;
}

function renderSummary(){

let total=0;

let counts={};

for(let p in products){
counts[p]=0;
}

sales.forEach(s=>{

if(s.cancelled) return;

total+=s.total;

s.items.forEach(i=>{
counts[i.name]+=i.qty;
});
});

document.getElementById("dailyTotal").innerText=
total+"円";

let html="";

for(let p in counts){
html+=`<div>${p} : ${counts[p]}個</div>`;
}

document.getElementById("productSummary").innerHTML=
html;
}

window.cancelLatestSale=async()=>{

const active=
sales.filter(s=>!s.cancelled);

if(active.length===0) return;

await updateDoc(
doc(db,"sales",active[0].id),
{
cancelled:true
}
);

alert("取消しました");
};

window.downloadCSV=()=>{

let csv="日時,担当者,合計,状態\n";

sales.forEach(s=>{

csv+=`${new Date(s.createdAt).toLocaleString()},${s.cashier},${s.total},${s.cancelled?"取消":"正常"}\n`;

});

const blob=
new Blob([csv],{type:"text/csv"});

const a=
document.createElement("a");

a.href=
URL.createObjectURL(blob);

a.download="sales.csv";

a.click();
};

renderItems();

</script></body>
</html>
