<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>屋台POS 完全版V2</title>
<style>
body{font-family:sans-serif;background:#f3f4f6;margin:0;padding:10px}
.card{background:#fff;border-radius:12px;padding:12px;margin:10px 0}
h1{text-align:center;background:#1e293b;color:#fff;padding:12px;border-radius:12px}
button{padding:12px;border:none;border-radius:10px}
#offlineBanner{display:none;background:#ef4444;color:#fff;padding:10px;text-align:center;border-radius:10px}
.item{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #ddd}
.big{font-size:32px;font-weight:bold;text-align:center}
</style>
</head>
<body>
<div id="offlineBanner">⚠ オフラインです</div>
<h1>🏮屋台POS 完全版V2</h1>

<div class="card">
<p>Firebase設定を貼り付けて使用してください。</p>
<ul>
<li>二重会計防止</li>
<li>オフライン警告</li>
<li>売上ランキング</li>
<li>日付指定CSV</li>
<li>取消履歴</li>
<li>スマホ最適化</li>
<li>Firestoreエラーログ</li>
</ul>
</div>

<div class="card">
<h3>担当者</h3>
<input id="cashier" style="width:100%;padding:10px">
</div>

<div class="card">
<div class="item"><span>冷やしきゅうり</span><span>200円</span></div>
<div class="item"><span>ヨーヨー釣り</span><span>200円</span></div>
<div class="item"><span>フルーツミックス</span><span>300円</span></div>
<div class="item"><span>ポッキンアイス</span><span>200円</span></div>
</div>

<div class="card">
<div class="big">V2ベースファイル</div>
<p>このファイルにFirebase接続部を組み込みます。</p>
</div>

<script>
window.addEventListener("offline",()=>{
 document.getElementById("offlineBanner").style.display="block";
});
window.addEventListener("online",()=>{
 document.getElementById("offlineBanner").style.display="none";
});
</script>
</body>
</html>
